name: Route Health CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  route-health:
    name: Route smoke, errors, and links
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      PORT: 3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_E2E_AUTH_BYPASS: "true"
      NEXT_PUBLIC_AUTH_BYPASS_ROLE: admin
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")" >> $GITHUB_ENV

    - name: Cache Playwright Binaries
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers (without deps if cached)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    - name: Install Playwright dependencies (if cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
      
    - name: TypeScript check
      run: npm run lint

    - name: Production build
      run: npm run build
      
    - name: Generate routes
      run: npm run test:routes:generate
      
    - name: Route smoke, link, and accessibility checks
      run: npx playwright test tests/route-smoke/all-pages.spec.ts tests/route-smoke/link-check.spec.ts tests/route-smoke/accessibility.spec.ts
        
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: generated-routes
        path: tests/route-smoke/routes.generated.json
        retention-days: 30
