version: '3.8'

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashboard_test
      POSTGRES_PASSWORD: dashboard_test
      POSTGRES_DB: dashboard_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_test -d dashboard_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
