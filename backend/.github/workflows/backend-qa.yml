name: Backend QA Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  qa:
    name: Backend QA
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dashboard_test
          POSTGRES_PASSWORD: dashboard_test
          POSTGRES_DB: dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0

      - name: Install gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Go Mod Tidy Check
        working-directory: backend
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run Build
        working-directory: backend
        run: |
          go build ./...

      - name: Run Migration Check
        working-directory: backend
        env:
          DATABASE_URL: postgres://dashboard_test:dashboard_test@localhost:5432/dashboard_test?sslmode=disable
        run: |
          go test -v ./internal/platform/postgres -run TestMigrationsIdempotency

      - name: Run Linting
        working-directory: backend
        run: |
          golangci-lint run ./...

      - name: Run Gosec Scan
        working-directory: backend
        run: |
          gosec ./...

      - name: Run Govulncheck Scan
        working-directory: backend
        run: |
          govulncheck ./...

      - name: Run Unit & Integration Tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://dashboard_test:dashboard_test@localhost:5432/dashboard_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          go test -v ./...

      - name: Run Race Detector Tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://dashboard_test:dashboard_test@localhost:5432/dashboard_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          go test -v -race ./...
