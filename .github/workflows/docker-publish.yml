name: Docker Publish (GHCR)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend-api
            context: ./backend
            file: ./backend/Dockerfile
            target: api
          - name: backend-worker
            context: ./backend
            file: ./backend/Dockerfile
            target: worker
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            target: runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the owner login may contain capitals.
      - name: Lowercase owner
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/ui-generator-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The frontend bakes the public API URL at build time. Set the repo
          # variable NEXT_PUBLIC_API_URL (Settings → Variables) to your public API
          # endpoint, e.g. https://api.your-domain.com/v1 . Ignored by the Go images.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
