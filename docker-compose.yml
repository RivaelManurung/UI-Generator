services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashboardcraft
      POSTGRES_PASSWORD: dashboardcraft
      POSTGRES_DB: dashboardcraft
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboardcraft -d dashboardcraft"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
